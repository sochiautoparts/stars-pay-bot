name: StarsPay Bot — Keep Alive

on:
  schedule:
    # Every 30 minutes — check and restart if needed
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Check if bot run is active
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Keep-alive check at $(date -u) ==="

          # Get recent workflow runs
          ACTIVE_COUNT=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/sochiautoparts/stars-pay-bot/actions/runs?status=in_progress&per_page=5" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          runs = [r for r in d.get('workflow_runs', []) if '24/7' in r.get('name','')]
          print(len(runs))
          ")

          echo "Active 24/7 runs: $ACTIVE_COUNT"

          if [ "$ACTIVE_COUNT" -eq 0 ]; then
            echo "⚠️ No active bot runs! Triggering restart..."
            curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/sochiautoparts/stars-pay-bot/actions/workflows/run-bot.yml/dispatches" \
              -d '{"ref":"main"}' -w "%{http_code}"
            echo ""
            echo "✅ Restart triggered!"
          else
            echo "✅ Bot is running, no action needed"
          fi
