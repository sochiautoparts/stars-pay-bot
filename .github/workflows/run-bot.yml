name: StarsPay Bot — 24/7 Runner

on:
  schedule:
    # Restart every 5 hours (6h max run, 5h gives 1h overlap)
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345  # 5h45m — leaves buffer before next cron

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: starspay.db
          key: starspay-db-v3
          restore-keys: |
            starspay-db-

      - name: Create data directory
        run: mkdir -p data

      - name: Restore licenses JSON
        uses: actions/cache@v4
        with:
          path: data/licenses.json
          key: licenses-json-v3
          restore-keys: |
            licenses-json-

      - name: Run bot (full session until timeout)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          API_KEYS: ${{ secrets.API_KEYS }}
          DATABASE_PATH: starspay.db
          MINIAPP_URL: ${{ secrets.MINIAPP_URL }}
        run: |
          echo "=== Bot session started at $(date -u) ==="
          python -m bot.main || true
          echo "=== Bot session ended at $(date -u) ==="

      - name: Sync licenses to JSON
        if: always()
        env:
          DATABASE_PATH: starspay.db
        run: |
          python3 -c "
          import sqlite3, json, time, hashlib, os

          db_path = os.getenv('DATABASE_PATH', 'starspay.db')
          if not os.path.exists(db_path):
              print('No database found, skipping sync')
              exit(0)

          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row

          cursor = conn.execute('''
              SELECT l.key, l.user_id, l.project, l.plan, l.activated_at, l.expires_at, l.active
              FROM licenses l
          ''')
          licenses = []
          for row in cursor.fetchall():
              d = dict(row)
              key = d.pop('key', '')
              d['key_hash'] = hashlib.sha256(key.encode()).hexdigest()[:16]
              d['key_prefix'] = key[:7] + '...'
              licenses.append(d)

          output = {
              'updated_at': time.time(),
              'updated_at_human': time.strftime('%Y-%m-%d %H:%M:%S UTC', time.gmtime()),
              'total_licenses': len(licenses),
              'active_licenses': sum(1 for l in licenses if l['active']),
              'licenses': licenses
          }

          os.makedirs('data', exist_ok=True)
          with open('data/licenses.json', 'w') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print(f'Synced {len(licenses)} licenses to data/licenses.json')
          conn.close()
          "

      - name: Commit licenses to repo
        if: always()
        run: |
          if [ ! -f data/licenses.json ]; then
            echo "No licenses.json to commit"
            exit 0
          fi
          git config user.name "StarsPay Bot"
          git config user.email "starspay-bot[bot]@users.noreply.github.com"
          git add data/licenses.json -f
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📦 Update licenses [skip ci]"
          git push || echo "Push failed (may be concurrent)"

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: starspay.db
          key: starspay-db-v3-${{ github.run_id }}
