name: Deploy Bot to Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'api/**'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy hook triggered"

      - name: Render Deploy Info
        run: |
          echo "To deploy on Render.com:"
          echo "1. Go to https://render.com/deploy?repo=https://github.com/sochiautoparts/stars-pay-bot"
          echo "2. Or set RENDER_DEPLOY_HOOK secret to trigger auto-deploy"
