services:
  - type: web
    name: starspay-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: 265070804
      - key: API_KEYS
        sync: false
      - key: API_PORT
        value: 8080
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/starspay.db
      - key: MINIAPP_URL
        value: https://sochiautoparts.github.io/stars-pay-bot/
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: starspay-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
